<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TourPlan AI - AI Powered Excel Automation</title>

    <meta name="theme-color" content="#0F172A">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#00E5FF",
                        secondary: "#7C3AED",
                        dark: "#050816"
                    },
                    fontFamily: {
                        sans: ["Inter","sans-serif"]
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

    <script defer src="app.js"></script>

</head>

<body class="bg-dark text-white min-h-screen overflow-x-hidden">

<!-- Animated Background -->
<div class="fixed inset-0 -z-10">

    <div class="absolute top-0 left-0 w-96 h-96 bg-cyan-500 opacity-20 blur-[120px] rounded-full animate-pulse"></div>

    <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-600 opacity-20 blur-[120px] rounded-full animate-pulse"></div>

</div>

<!-- Navbar -->

<header class="w-full py-6">

    <div class="max-w-6xl mx-auto flex flex-col items-center">

        <h1 class="text-5xl font-extrabold text-cyan-400 tracking-tight">
            🤖 TourPlan AI
        </h1>

        <p class="text-gray-300 text-lg mt-2">
            AI Powered Excel Automation
        </p>

    </div>

</header>

<!-- Main -->

<main class="flex justify-center items-center p-6">

<div class="w-full max-w-xl bg-white/10 backdrop-blur-xl rounded-3xl border border-white/10 shadow-2xl p-8">

<h2 class="text-3xl font-bold mb-2">

Generate Monthly Tour Plan

</h2>

<p class="text-gray-300 mb-6">

Upload your Excel file and let AI generate the next month's Tour Plan.

</p>

<label class="block">

<span class="text-sm text-gray-300">

Upload Excel

</span>

<input

id="excelFile"

type="file"

accept=".xlsx"

class="mt-2 block w-full rounded-xl bg-black/30 p-3 border border-cyan-400"

>

</label>

<div class="grid grid-cols-2 gap-4 mt-6">

<div>

<label class="text-sm text-gray-300">

Month

</label>

<select

id="month"

class="mt-2 w-full rounded-xl bg-black/30 p-3 border border-cyan-400"

>

<option>January</option>

<option>February</option>

<option>March</option>

<option>April</option>

<option>May</option>

<option>June</option>

<option selected>July</option>

<option>August</option>

<option>September</option>

<option>October</option>

<option>November</option>

<option>December</option>

</select>

</div>

<div>

<label class="text-sm text-gray-300">

Year

</label>

<input

id="year"

type="number"

value="2026"

class="mt-2 w-full rounded-xl bg-black/30 p-3 border border-cyan-400"

>

</div>

</div>

<button

id="generateBtn"

class="w-full mt-8 bg-cyan-400 text-black font-bold py-4 rounded-xl hover:scale-105 transition"

>

⚡ Generate Tour Plan

</button>

<div id="status" class="mt-8">

<div class="rounded-2xl bg-black/20 border border-cyan-500/30 p-5">

<h3 class="text-cyan-400 text-xl font-bold mb-4">
📄 Workbook Information
</h3>

<div class="space-y-2 text-gray-200">

<p><strong>📁 File :</strong> <span id="fileName">Waiting...</span></p>

<p><strong>📑 Sheet :</strong> <span id="sheetName">-</span></p>

<p><strong>📊 Rows :</strong> <span id="rowCount">-</span></p>

<p><strong>📅 Month :</strong> <span id="selectedMonth">-</span></p>

<p class="text-green-400">
✅ Ready to Generate
</p>

</div>

</div>

</div>

</div>

</main>

</body>


</html>
